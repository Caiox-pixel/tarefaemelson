<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema Mobile de Registro Offline de Atendimentos">
  <meta name="theme-color" content="#1e3c72">

  <link rel="stylesheet" href="css/style.css">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%231e3c72'>📋</text></svg>"
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">

  <title>Sistema Offline de Atendimentos</title>
</head>

<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <h1>Atendimentos</h1>
      <div class="header-status">
        <span id="statusConexao" class="status-indicador status-offline">
          <span class="indicator"></span> Offline
        </span>
        <span id="statusSupabase" class="status-indicador status-offline">
          <span class="indicator"></span> Supabase desconectado
        </span>
        <span id="statusSincronizacao" class="status-sincronizacao">
          <span class="indicator"></span> Tudo sincronizado
        </span>
        <button type="button" id="themeToggle" class="btn btn-secondary">Modo Escuro</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
      <!-- Mensagem de Status -->
      <div id="mensagem-erro" class="mensagem" style="display: none;"></div>

      <!-- Seção de Formulário -->
      <section class="form-section">
        <h2>Novo Atendimento</h2>
        <form class="form-atendimento">
          <div class="form-row">
            <div class="form-group">
              <label for="nome">Nome do Atendido</label>
              <input
                type="text"
                id="nome"
                placeholder="Nome completo"
                maxlength="100"
                required
              >
            </div>

            <div class="form-group">
              <label for="cpf">CPF</label>
              <input
                type="text"
                id="cpf"
                placeholder="000.000.000-00"
                maxlength="14"
                required
              >
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="idade">Idade</label>
              <input
                type="number"
                id="idade"
                placeholder="Idade"
                min="0"
                max="120"
                required
              >
            </div>

            <div class="form-group">
              <label for="contato">Meio de Contato</label>
              <input
                type="text"
                id="contato"
                placeholder="Telefone ou e-mail"
                maxlength="100"
                required
              >
            </div>
          </div>

          <div class="form-group">
            <label for="tipoProblema">Tipo de Problema</label>
            <select id="tipoProblema" required>
              <option value="">Selecione o tipo de problema</option>
              <option value="Problema com água">Problema com água</option>
              <option value="Problema com energia">Problema com energia</option>
              <option value="Problema com esgoto">Problema com esgoto</option>
              <option value="Problema com infraestrutura">Problema com infraestrutura</option>
              <option value="Outro">Outro</option>
            </select>
          </div>

          <div class="form-group">
            <label for="descricao">Descrição do Problema</label>
            <textarea
              id="descricao"
              placeholder="Descreva o problema com o máximo de detalhes possível..."
              maxlength="1000"
              rows="4"
              required
            ></textarea>
          </div>

          <div class="form-actions">
            <button type="button" id="salvar" class="btn btn-primary">
              Salvar Atendimento
            </button>
            <button type="button" id="sincronizar" class="btn btn-secondary">
              Sincronizar Agora
            </button>
          </div>
        </form>
      </section>

          <section class="search-section">
            <h2>Pesquisar por Nome</h2>
            <div class="search-box">
              <input
                type="text"
                id="searchNome"
                placeholder="Digite o nome a buscar"
              >
              <button type="button" id="searchButton" class="btn btn-secondary">
                Buscar
              </button>
            </div>
            <div id="searchResult" class="search-results"></div>
          </section>

      <!-- Dashboard de Estatísticas -->
      <section class="dashboard-section">
        <h2>Estatísticas</h2>
        <div class="dashboard-grid">
          <div class="dashboard-card total">
            <div class="card-value" id="total">0</div>
            <div class="card-label">Total de Registros</div>
          </div>

          <div class="dashboard-card pending">
            <div class="card-value" id="pendentes">0</div>
            <div class="card-label">Pendentes</div>
          </div>

          <div class="dashboard-card synced">
            <div class="card-value" id="sincronizados">0</div>
            <div class="card-label">Sincronizados</div>
          </div>

          <div class="dashboard-card error">
            <div class="card-value" id="erros">0</div>
            <div class="card-label">Falhas</div>
          </div>
        </div>
      </section>

      <!-- Lista de Atendimentos -->
      <section class="lista-section">
        <h2>Registros de Atendimentos</h2>
        <div id="lista" class="lista-atendimentos"></div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>Sistema de Atendimento Offline</p>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/db.js"></script>
  <script src="js/api.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
